[addressbooks]
[[contacts]]
path = ~/.local/share/contacts/addressbook

[general]
debug = no
default_action = list
editor = vim

[contact table]
display = formatted_name
group_by_addressbook = no
reverse = no
show_nicknames = no
show_uids = no
show_kinds = no
sort = last_name
localize_dates = yes
preferred_phone_number_type = pref, cell, mobile, home, work
preferred_email_address_type = pref, work, home

[vcard]
preferred_version = 3.0
search_in_source_files = no
skip_unparsable = yes
